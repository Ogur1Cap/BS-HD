spring:
  datasource:
    # 本地开发可通过环境变量覆盖，避免把个人数据库密码写死在仓库中
    url: ${DB_URL:jdbc:mysql://localhost:3306/deltaforce?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456789}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.security: INFO
