spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

app:
  jwt:
    issuer: test
    access-expire-minutes: 120
    refresh-expire-days: 7
    secret: ThisIsATestSecretKeyForJwtAtLeast32Chars
